{% extends "base.html" %}

{% block title %}{{ chat_name or 'Чат' }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 900px; padding: 20px;">
    <div class="chat-view">
        <div class="chat-header">
            <a href="{{ url_for('chat.index') }}" class="btn-back">←</a>
            <h2 id="chat-title">{{ chat_name }}</h2>
            <span class="users-count">Чат</span>
        </div>

        <div class="messages-container" id="messages">
            <div class="loading">Загрузка сообщений...</div>
        </div>

        <form class="message-form" id="message-form">
            <input type="text" id="message-input" placeholder="Написать сообщение..." required autocomplete="off">
            <button type="submit" class="btn-send">➤</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatId = {{ chat_id }};
const messagesDiv = document.getElementById('messages');
const messageForm = document.getElementById('message-form');
const messageInput = document.getElementById('message-input');

// Загрузка сообщений
async function loadMessages() {
    try {
        const response = await fetch(`/chat/api/messages/${chatId}`);
        const data = await response.json();

        messagesDiv.innerHTML = '';

        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message other';

                let time = '';
                if (msg.timestamp) {
                    time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                msgDiv.innerHTML = `
                    <div class="message-content">${msg.content}</div>
                    <div class="message-meta">
                        <span class="message-time">${time}</span>
                    </div>
                `;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } else {
            messagesDiv.innerHTML = '<div class="empty-msg">Нет сообщений. Будьте первым!</div>';
        }
    } catch (error) {
        console.error('Ошибка загрузки:', error);
        messagesDiv.innerHTML = '<div class="error">Ошибка загрузки сообщений</div>';
    }
}

// Отправка сообщения
messageForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const content = messageInput.value.trim();
    if (!content) return;

    const btn = messageForm.querySelector('.btn-send');
    btn.disabled = true;
    btn.style.opacity = '0.5';

    try {
        const response = await fetch('/chat/api/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: chatId,
                content: content
            })
        });

        if (response.ok) {
            messageInput.value = '';
            await loadMessages();
        } else {
            const errorData = await response.json();
            alert('Ошибка: ' + (errorData.error || 'Неизвестная ошибка'));
        }
    } catch (error) {
        console.error('Ошибка отправки:', error);
        alert('Не удалось отправить сообщение');
    } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
        messageInput.focus();
    }
});

// Инициализация
loadMessages();
setInterval(loadMessages, 3000);
</script>
{% endblock %}
