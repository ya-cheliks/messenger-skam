{% extends "base.html" %}

{% block title %}{{ chat_name or 'Чат' }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 900px; padding: 20px;">
    <div class="chat-view">
        <div class="chat-header">
            <button class="btn-back" onclick="window.location.href='{{ url_for('chat.index') }}'">←</button>
            <h2 id="chat-title">{{ chat_name }}</h2>
            <span class="users-count">Чат</span>
        </div>

        <div class="messages-container" id="messages">
            <div class="loading">Загрузка сообщений...</div>
        </div>

        <form class="message-form" id="message-form">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button type="button" class="btn-attach" onclick="document.getElementById('file-input').click()" title="Прикрепить фото">📎</button>
            <input type="text" id="message-input" placeholder="Написать сообщение..." required autocomplete="off">
            <button type="submit" class="btn-send">➤</button>
        </form>

        <div id="file-preview" style="display: none; padding: 10px; background: #1a1a1a; border-top: 1px solid #444;">
            <img id="preview-image" src="" style="max-height: 100px; border-radius: 5px;">
            <button type="button" onclick="removeFile()" style="margin-left: 10px; background: #ff033e; border: none; color: #000; padding: 5px 10px; border-radius: 5px; cursor: pointer;">✕</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatId = {{ chat_id }};
const currentUserId = {{ current_user.id }};
const messagesDiv = document.getElementById('messages');
const messageForm = document.getElementById('message-form');
const messageInput = document.getElementById('message-input');
const fileInput = document.getElementById('file-input');
const filePreview = document.getElementById('file-preview');
const previewImage = document.getElementById('preview-image');

let selectedFile = null;
let lastMessageId = 0;
let isFirstLoad = true;

// Загрузка сообщений с "умной" подгрузкой
async function loadMessages() {
    try {
        const response = await fetch(`/chat/api/messages/${chatId}`);
        const data = await response.json();

        if (!data.messages) return;

        if (isFirstLoad) {
            messagesDiv.innerHTML = '';
            if (data.messages.length === 0) {
                messagesDiv.innerHTML = '<div class="empty-msg">Нет сообщений. Будьте первым!</div>';
                return;
            }
            data.messages.forEach(msg => {
                appendMessage(msg);
                lastMessageId = msg.id;
            });
            isFirstLoad = false;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return;
        }

        let hasNew = false;
        data.messages.forEach(msg => {
            if (msg.id > lastMessageId) {
                appendMessage(msg);
                lastMessageId = msg.id;
                hasNew = true;
            }
        });
        if (hasNew) messagesDiv.scrollTop = messagesDiv.scrollHeight;

    } catch (error) {
        console.error('Ошибка:', error);
    }
}

// Отрисовка одного сообщения
function appendMessage(msg) {
    const empty = document.querySelector('.empty-msg');
    if (empty) empty.remove();

    const div = document.createElement('div');
    const isMine = msg.sender_id === currentUserId;
    div.className = isMine ? 'message mine' : 'message other';

    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '';

    // ✅ Аватар и имя для чужих сообщений
    let header = '';
    if (!isMine) {
        const avatar = msg.sender_avatar || (await getUserAvatar(msg.sender_id));
        const avatarHtml = avatar
            ? `<img src="${avatar}" class="message-avatar" alt="">`
            : `<div class="message-avatar placeholder">${(msg.sender_name || '?')[0].toUpperCase()}</div>`;
        header = `<div class="message-header">${avatarHtml}<span class="message-sender">${msg.sender_name || 'Unknown'}</span></div>`;
    }

    const photo = msg.picture ? `<img src="${msg.picture}" class="message-photo" onclick="window.open(this.src)">` : '';

    div.innerHTML = `${header}<div class="message-content">${msg.content}</div>${photo}<div class="message-meta"><span class="message-time">${time}</span></div>`;
    messagesDiv.appendChild(div);
}

// Получение аватара пользователя через API
async function getUserAvatar(userId) {
    try {
        const res = await fetch(`/chat/api/user/${userId}`);
        const data = await res.json();
        return data.user?.avatar || null;
    } catch { return null; }
}

// Выбор файла для отправки
fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file?.type.startsWith('image/')) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = ev => { previewImage.src = ev.target.result; filePreview.style.display = 'block'; };
        reader.readAsDataURL(file);
    }
});

function removeFile() {
    selectedFile = null; fileInput.value = ''; filePreview.style.display = 'none';
}

// Отправка сообщения
messageForm.addEventListener('submit', async e => {
    e.preventDefault();
    const content = messageInput.value.trim();
    if (!content && !selectedFile) return;

    const btn = messageForm.querySelector('.btn-send');
    btn.disabled = true;

    try {
        let payload = { chat_id: chatId, content: content || '[Фото]' };
        if (selectedFile) {
            const reader = new FileReader();
            payload.picture = await new Promise(res => { reader.onload = () => res(reader.result); reader.readAsDataURL(selectedFile); });
        }

        const res = await fetch('/chat/api/messages', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if (res.ok) { messageInput.value = ''; removeFile(); loadMessages(); }
        else alert('Ошибка отправки');
    } catch { alert('Не удалось подключиться'); }
    finally { btn.disabled = false; }
});

// Запуск
loadMessages();
setInterval(loadMessages, 3000);
</script>
{% endblock %}
